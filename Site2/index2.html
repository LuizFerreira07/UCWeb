<!DOCTYPE html>
<html lang="pt-BR" <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pré Venda The First of Us</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>
    <main class="hotsite-container">
        <section>
            <h1>First of Us</h1>
            <p>Faça o registro para receber recompensas dentro do jogo.</p>
        </section>
        <section class="hotsite-form-wrapper">
            <form action="#" method="POST" class="cadastro-form">
                <legend>Disponivel apartir de 04/09/2026</legend>
                <fieldset>
                    <legend>Faça o pré registro</legend>

                    <div class="input-group"><label for="nome"></label> <input type="text" id="nome" name="nome"
                            required placeholder="Seu Nome"> </div>

                    <div class="email"><label for="email"> </label> <input type="email" id="email" name="email" required
                            placeholder="Seu email"></div>

                    <div class="nickname"> <label for="nickname"></label><input type="text" id="nickname"
                            name="nickname" required placeholder="Seu nick:"></div>

                    <section>
                        <fieldset>
                            <div>
                                <label for="plataforma">Escolha a plataforma:</label>
                                <select id="plataforma" name="plataforma">
                                    <option value="PC" selected>PC</option>
                                    <option value="Playstation">Playstation</option>
                                    <option value="Xbox">Xbox</option>
                                    <option value="Nintendo">Nintendo</option>
                                </select>
                            </div>
                            
                            <div><button type="button">Registrar</button></div>
                        </fieldset>
                    </section>
                    </div>
                </fieldset>
        </section>

</body>
